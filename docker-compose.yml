services:

  postgresql:
    image: postgres:16-alpine
    container_name: e-commerce-data-posgresql
    environment:
      POSTGRES_DB: eCommerceDb
      POSTGRES_USER: eCommerce
      POSTGRES_PASSWORD: eCommerce
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U eCommerce -d eCommerceDb" ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro


  e-commerce-data-generator:
    build:
      context: .
      dockerfile: Dockerfile
    image: e-commerce-data-generator:local
    command: [ "python", "-m", "app.main" ]
    restart: "no"

volumes:
  postgres_data: